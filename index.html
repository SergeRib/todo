<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Todo">
<title>Todo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #666;
    --accent: #e8ff6b;
    --accent-dark: #c8df3b;
    --pro: #4fc3f7;
    --actalan: #ce93d8;
    --calef: #ffb74d;
    --famille: #f48fb1;
    --perso: #80cbc4;
    --danger: #ef5350;
    --high: #ef5350;
    --normal: #ffb74d;
    --low: #80cbc4;
    --radius: 10px;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  #app { max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header {
    padding: 24px 20px 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--border);
  }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .counter { font-family: var(--font-mono); font-size: 11px; color: var(--accent); }

  /* Filters */
  .filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }
  .filter-btn:not(.active):hover { border-color: #444; color: var(--text); }

  /* Task list */
  .task-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color 0.15s, opacity 0.2s;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .task-item.done { opacity: 0.4; }
  .task-item:active { background: var(--surface2); }

  .check-wrap { padding-top: 2px; flex-shrink: 0; }
  .check-wrap input[type="checkbox"] { display: none; }
  .check-box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check-box.checked { background: var(--accent); border-color: var(--accent); }
  .check-box.checked::after { content: ''; width: 5px; height: 9px; border: 2px solid #000; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); display: block; }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; line-height: 1.4; color: var(--text); word-break: break-word; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

  .task-meta { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }

  .badge {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .badge-pro { background: rgba(79,195,247,0.12); color: var(--pro); }
  .badge-actalan { background: rgba(206,147,216,0.12); color: var(--actalan); }
  .badge-calef { background: rgba(255,183,77,0.12); color: var(--calef); }
  .badge-famille { background: rgba(244,143,177,0.12); color: var(--famille); }
  .badge-perso { background: rgba(128,203,196,0.12); color: var(--perso); }

  .badge-high { background: rgba(239,83,80,0.12); color: var(--high); }
  .badge-normal { background: rgba(255,183,77,0.1); color: var(--normal); }
  .badge-low { background: rgba(128,203,196,0.1); color: var(--low); }

  .deadline-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .deadline-badge.overdue { color: var(--danger); }

  .delete-btn {
    background: none; border: none; cursor: pointer;
    color: var(--border);
    font-size: 18px; line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
    flex-shrink: 0;
    margin-top: -1px;
  }
  .delete-btn:hover { color: var(--danger); }

  /* Empty */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
  }

  /* FAB */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom));
    right: 50%;
    transform: translateX(50%);
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 28px;
    padding: 0 28px;
    height: 52px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(232,255,107,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    z-index: 20;
    max-width: calc(480px - 32px);
    width: calc(100% - 32px);
    justify-content: center;
  }
  .fab:active { transform: translateX(50%) scale(0.97); box-shadow: 0 2px 10px rgba(232,255,107,0.15); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 30;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%; max-width: 480px; margin: 0 auto;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%);
    transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-title { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 6px; }

  .field input[type="text"],
  .field input[type="date"],
  .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-sans);
    font-size: 15px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }

  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }

  .mic-row { display: flex; gap: 8px; align-items: flex-end; }
  .mic-row .field { flex: 1; margin-bottom: 0; }
  .mic-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .mic-btn.recording { background: rgba(239,83,80,0.15); border-color: var(--danger); color: var(--danger); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .submit-btn {
    width: 100%; height: 50px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s;
  }
  .submit-btn:active { opacity: 0.8; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    z-index: 40;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <span class="logo">// todo</span>
      <span class="counter" id="counter">—</span>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="active">À faire</button>
      <button class="filter-btn" data-filter="done">Faites</button>
      <button class="filter-btn" data-filter="actalan">Actalan</button>
      <button class="filter-btn" data-filter="calef">CALEF</button>
      <button class="filter-btn" data-filter="famille">Famille</button>
      <button class="filter-btn" data-filter="pro">Pro</button>
      <button class="filter-btn" data-filter="perso">Perso</button>
    </div>
  </div>

  <div id="task-container">
    <div class="loading"><div class="spinner"></div>chargement...</div>
  </div>
</div>

<button class="fab" id="fab-btn">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
  nouvelle tâche
</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nouvelle tâche</div>
    <div class="field">
      <label>Tâche</label>
      <div class="mic-row">
        <div class="field" style="margin-bottom:0">
          <input type="text" id="task-input" placeholder="Que faut-il faire ?" autocomplete="off" />
        </div>
        <button class="mic-btn" id="mic-btn" title="Dicter">🎤</button>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Catégorie</label>
        <select id="cat-input">
          <option value="pro">Pro</option>
          <option value="actalan">Actalan</option>
          <option value="calef">CALEF</option>
          <option value="famille">Famille</option>
          <option value="perso">Perso</option>
        </select>
      </div>
      <div class="field">
        <label>Priorité</label>
        <select id="priority-input">
          <option value="normal">Normale</option>
          <option value="high">Haute</option>
          <option value="low">Basse</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Date limite (optionnel)</label>
      <input type="date" id="deadline-input" />
    </div>
    <button class="submit-btn" id="submit-btn">Ajouter</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycby5N34J20oyVI0z0WRW3Kg60GgSVZmG0nTs7CQ4MY9GjaNQ5J4NrbawhHMkXQslfXVrAg/exec';
let tasks = [];
let filter = 'all';

async function fetchTasks() {
  try {
    const r = await fetch(API);
    const data = await r.json();
    tasks = data.filter(t => t.id);
    render();
  } catch(e) {
    document.getElementById('task-container').innerHTML = '<div class="empty">impossible de charger les tâches</div>';
  }
}

async function addTask(text, cat, priority, deadline) {
  const task = { action: 'add', id: Date.now(), text, cat, priority, deadline, date: new Date().toISOString().split('T')[0] };
  tasks.unshift(task);
  render();
  try {
    await fetch(API, { method: 'POST', body: JSON.stringify(task) });
  } catch(e) { showToast('erreur réseau'); }
}

async function toggleTask(id) {
  const t = tasks.find(t => String(t.id) === String(id));
  if (t) { t.done = t.done === 'TRUE' || t.done === true ? false : true; render(); }
  try { await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'toggle', id }) }); } catch(e) {}
}

async function deleteTask(id) {
  tasks = tasks.filter(t => String(t.id) !== String(id));
  render();
  try { await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'delete', id }) }); } catch(e) {}
}

function isDone(t) { return t.done === true || t.done === 'TRUE'; }

function render() {
  let visible = tasks;
  if (filter === 'active') visible = tasks.filter(t => !isDone(t));
  else if (filter === 'done') visible = tasks.filter(t => isDone(t));
  else if (['actalan','calef','famille','perso','pro'].includes(filter)) visible = tasks.filter(t => t.cat === filter);

  const active = tasks.filter(t => !isDone(t)).length;
  document.getElementById('counter').textContent = active > 0 ? `${active} à faire` : 'tout est fait ✓';

  if (!visible.length) {
    document.getElementById('task-container').innerHTML = '<div class="empty">aucune tâche ici</div>';
    return;
  }

  const today = new Date().toISOString().split('T')[0];

  document.getElementById('task-container').innerHTML = `<div class="task-list">${visible.map(t => {
    const done = isDone(t);
    const overdue = t.deadline && t.deadline < today && !done;
    return `<div class="task-item ${done ? 'done' : ''}">
      <div class="check-wrap">
        <div class="check-box ${done ? 'checked' : ''}" onclick="toggleTask('${t.id}')"></div>
      </div>
      <div class="task-body">
        <div class="task-text">${escHtml(String(t.text || ''))}</div>
        <div class="task-meta">
          <span class="badge badge-${t.cat}">${t.cat}</span>
          ${t.priority && t.priority !== 'normal' ? `<span class="badge badge-${t.priority}">${t.priority === 'high' ? 'urgent' : 'low'}</span>` : ''}
          ${t.deadline ? `<span class="deadline-badge ${overdue ? 'overdue' : ''}">◷ ${formatDate(t.deadline)}</span>` : ''}
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask('${t.id}')">×</button>
    </div>`;
  }).join('')}</div>`;
}

function formatDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y.slice(2)}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Modal
const modal = document.getElementById('modal');
document.getElementById('fab-btn').onclick = () => modal.classList.add('open');
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

document.getElementById('submit-btn').onclick = async () => {
  const text = document.getElementById('task-input').value.trim();
  if (!text) return;
  const cat = document.getElementById('cat-input').value;
  const priority = document.getElementById('priority-input').value;
  const deadline = document.getElementById('deadline-input').value;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'ajout...';
  await addTask(text, cat, priority, deadline);
  document.getElementById('task-input').value = '';
  document.getElementById('deadline-input').value = '';
  document.getElementById('priority-input').value = 'normal';
  btn.disabled = false;
  btn.textContent = 'Ajouter';
  modal.classList.remove('open');
  showToast('tâche ajoutée');
};

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
});

// Mic / dictée
const micBtn = document.getElementById('mic-btn');
let recognition = null;
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    document.getElementById('task-input').value = e.results[0][0].transcript;
    micBtn.classList.remove('recording');
  };
  recognition.onend = () => micBtn.classList.remove('recording');
  micBtn.onclick = () => {
    if (micBtn.classList.contains('recording')) { recognition.stop(); }
    else { micBtn.classList.add('recording'); recognition.start(); }
  };
} else {
  micBtn.style.display = 'none';
}

fetchTasks();
</script>
</body>
</html>
